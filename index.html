<!DOCTYPE html>
<html>
<head>
  <title>Rakib AI ULTRA 🔥</title>

  <style>
    body {
      background: #020617;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .box {
      margin-top: 40px;
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: red;
      color: white;
    }

    .result {
      font-size: 35px;
      margin: 20px;
      color: lime;
      transition: 0.3s;
    }

    .timer {
      font-size: 20px;
      color: orange;
    }

    table {
      margin: auto;
      margin-top: 20px;
      width: 80%;
      border-collapse: collapse;
    }

    td, th {
      border: 1px solid gray;
      padding: 10px;
    }

    th {
      background: black;
    }
  </style>
</head>

<body>

<div class="box" id="loginBox">
  <h2>Login 🔐</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div class="box" id="appBox" style="display:none;">
  <h1>Rakib AI ULTRA 🔥</h1>

  <div class="timer" id="timer">Next in: 5</div>
  <div class="result" id="result">--</div>

  <button onclick="predict()">Predict</button>

  <h3>History 📊</h3>
  <table>
    <thead>
      <tr><th>#</th><th>Result</th></tr>
    </thead>
    <tbody id="history"></tbody>
  </table>
</div>

<script>
let time = 5;
let count = 1;

// Auto login if saved
if (localStorage.getItem("user")) {
  showApp();
}

// Login
function login() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if (u && p) {
    localStorage.setItem("user", u);
    showApp();
  } else {
    alert("Enter details");
  }
}

// Show App
function showApp() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("appBox").style.display = "block";
  startTimer();
}

// Timer
function startTimer() {
  setInterval(() => {
    time--;
    document.getElementById("timer").innerText = "Next in: " + time;

    if (time === 0) {
      predict();
      time = 5;
    }
  }, 1000);
}

// Prediction
function predict() {
  let options = ["WIN", "LOSE"];
  let result = options[Math.floor(Math.random() * 2)];

  let el = document.getElementById("result");
  el.innerText = result;

  el.style.transform = "scale(1.3)";
  setTimeout(() => el.style.transform = "scale(1)", 200);

  let row = `<tr><td>${count++}</td><td>${result}</td></tr>`;
  document.getElementById("history").innerHTML += row;
}
</script>

</body>
</html>
